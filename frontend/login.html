<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – EventSphere</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="bg-dark text-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand es-brand" href="index.html">
            <span class="brand-icon"><i class="bi bi-hexagon-fill"></i></span>
            EventSphere
        </a>
    </nav>

    <!-- LOGIN FORM -->
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 90vh;">
        <div class="col-md-4">

            <div class="card p-4 shadow-lg border-0">
                <h3 class="text-center mb-3">Welcome Back</h3>
                <p class="text-muted text-center mb-4">Login to continue</p>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label text-secondary">Email</label>
                    <input id="email" type="email" class="form-control" placeholder="Enter your email">
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label text-secondary">Password</label>
                    <input id="password" type="password" class="form-control" placeholder="Enter your password">
                </div>

                <!-- Button -->
                <button onclick="loginUser()" class="btn btn-es-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Login
                </button>

                <!-- Register Link -->
                <p class="text-center mt-3 mb-0">
                    Don't have an account?
                    <a href="register.html" class="text-decoration-none">Sign Up</a>
                </p>

            </div>

        </div>
    </div>

    <!-- JS FILES -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

</body>

</html>
