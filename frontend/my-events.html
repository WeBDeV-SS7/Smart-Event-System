<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events – EventSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <a href="index.html" class="navbar-brand">EventSphere</a>
        <div>
            <a href="events.html" class="btn btn-outline-light btn-sm me-2">Browse Events</a>
            <button onclick="logoutUser()" class="btn btn-danger btn-sm">Logout</button>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container mt-5">
        <h2 class="mb-4 text-center">My Registered Events</h2>
        <div class="row" id="myEvents">
            <p class="text-center">Loading your registrations...</p>
        </div>
    </div>

    <!-- JS DEPENDENCIES -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // 🔒 Protect page
        if (!localStorage.getItem("user_id")) {
            alert("Please login first");
            window.location.href = "login.html";
        }

        const container = document.getElementById("myEvents");

        // 🔥 Fetch live registrations from Django
        async function loadMyEvents() {
            const userId = localStorage.getItem("user_id");

            try {
                // Fetch data from your Django server
                let response = await apiRequest(`/my-registrations/?user_id=${userId}`);

                console.log("Raw Data from Backend:", response);

                // DATA CLEANER: Ensure we have an array to loop through
                const registrations = Array.isArray(response) ? response : (response.results || response.registrations || []);

                container.innerHTML = "";

                if (registrations.length === 0) {
                    container.innerHTML = `
                        <div class="text-center mt-5">
                            <h5>No events registered</h5>
                            <p class="text-muted">Go register for events to see them here.</p>
                            <a href="events.html" class="btn btn-primary mt-2">Browse Events</a>
                        </div>`;
                    return;
                }

                container.innerHTML = registrations.map(reg => {
                    // FIELD MAPPING: Handle the nested Serializer structure
                    const e = reg.event || reg;
                    const eventTitle = e.title || e.name || "Untitled Event";
                    const eventDate = e.date || "Date TBA";
                    const eventLoc = e.location || "Venue TBA";

                    return `
                    <div class="col-md-4 mb-4">
                        <div class="card shadow-sm h-100 border-0">
                            <div class="card-body">
                                <h5 class="card-title text-primary">${eventTitle}</h5>
                                <p class="text-muted mb-1">${eventDate}</p>
                                <p class="text-muted small">${eventLoc}</p>
                                <span class="badge bg-success mb-2">Registered</span>
                                <button class="btn btn-outline-danger btn-sm w-100 mt-2" onclick="cancelRegistration(${reg.id})">
                                    Cancel Registration
                                </button>
                            </div>
                        </div>
                    </div>`;
                }).join("");

            } catch (error) {
                console.error("Error loading registrations:", error);
                container.innerHTML = "<p class='text-danger text-center'>Failed to load registrations. Check server connection.</p>";
            }
        }

        // ❌ Cancel Registration via API
        async function cancelRegistration(regId) {
            if (!confirm("Are you sure you want to cancel?")) return;

            try {
                await apiRequest(`/registrations/${regId}/`, 'DELETE');
                alert("Registration cancelled!");
                loadMyEvents(); // Refresh the list
            } catch (error) {
                console.error("Cancel error:", error);
                alert("Failed to cancel registration.");
            }
        }

        function logoutUser() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        // Initialize
        document.addEventListener("DOMContentLoaded", loadMyEvents);
    </script>
</body>

</html>
