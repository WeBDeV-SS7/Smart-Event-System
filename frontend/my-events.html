<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events – EventSphere</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <a href="index.html" class="navbar-brand">EventSphere</a>

        <div>
            <a href="events.html" class="btn btn-outline-light btn-sm me-2">Browse Events</a>
            <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container mt-5">

        <h2 class="mb-4 text-center">My Registered Events</h2>

        <!-- EVENTS GRID -->
        <div class="row" id="myEvents"></div>

    </div>

    <!-- JS -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>

    <script>
        // 🔒 Protect page
        if (!localStorage.getItem("user_id")) {
            alert("Please login first");
            window.location.href = "login.html";
        }

        document.addEventListener("DOMContentLoaded", () => {

            const container = document.getElementById("myEvents");
            const myEventsIds = JSON.parse(localStorage.getItem("myEvents")) || [];

            // Empty state
            if (myEventsIds.length === 0) {
                container.innerHTML = `
        <div class="text-center mt-5">
          <h5>No events registered</h5>
          <p class="text-muted">Go register for events to see them here.</p>
          <a href="events.html" class="btn btn-primary mt-2">Browse Events</a>
        </div>
      `;
                return;
            }

            const myEvents = eventsData.filter(e => myEventsIds.includes(e.id));

            container.innerHTML = myEvents.map(e => `
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">${e.title}</h5>
            <p class="text-muted mb-1">${e.date}</p>
            <p class="text-muted">${e.location}</p>

            <button class="btn btn-danger w-100"
              onclick="removeEvent(${e.id})">
              Cancel Registration
            </button>
          </div>
        </div>
      </div>
    `).join("");
        });

        // ❌ Remove event
        function removeEvent(eventId) {
            let myEvents = JSON.parse(localStorage.getItem("myEvents")) || [];

            myEvents = myEvents.filter(id => id !== eventId);

            localStorage.setItem("myEvents", JSON.stringify(myEvents));

            alert("Event removed!");
            location.reload();
        }
    </script>

</body>

</html>
