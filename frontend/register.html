<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – EventSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="bg-dark text-light">

    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand es-brand" href="index.html">
            <span class="brand-icon"><i class="bi bi-hexagon-fill"></i></span>
            EventSphere
        </a>
    </nav>

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 90vh;">
        <div class="col-md-5">
            <div class="card p-4 shadow-lg border-0">
                <h3 class="text-center mb-3">Create Account</h3>
                <p class="text-secondary text-center mb-4">Join EventSphere for Smart Event Management</p>

                <!-- Added Form Tag to fix [DOM] warnings -->
                <form id="registerForm" onsubmit="event.preventDefault(); handleRegister();">
                    <div class="mb-3">
                        <label class="form-label text-secondary">Full Name</label>
                        <input id="name" type="text" class="form-control" placeholder="Enter your name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary">Email</label>
                        <input id="email" type="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary">Password</label>
                        <input id="password" type="password" class="form-control" placeholder="Min 6 characters"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary">Confirm Password</label>
                        <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm password"
                            required>
                    </div>

                    <button type="submit" class="btn btn-es-primary w-100">
                        <i class="bi bi-person-plus-fill me-2"></i> Sign Up
                    </button>
                </form>

                <p class="text-center mt-3 mb-0">
                    Already have an account? <a href="login.html" class="text-decoration-none">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

    <script>
        function handleRegister() {
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password.length < 6) {
                alert("Password must be at least 6 characters");
                return;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            // Call the function in auth.js
            registerUser(name, email, password);
        }
    </script>
</body>

</html>
