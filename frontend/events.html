<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Events – EventSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <a href="index.html" class="navbar-brand">EventSphere</a>
        <div>
            <a href="my-events.html" class="btn btn-outline-light btn-sm me-2">My Events</a>
            <button onclick="logoutUser()" class="btn btn-danger btn-sm">Logout</button>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container mt-5">
        <h2 class="mb-4 text-center">Available Events</h2>
        <div class="row" id="browseEventsContainer">
            <p class="text-center">Loading available events...</p>
        </div>
    </div>

    <!-- JS DEPENDENCIES -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // 🔒 Protect page - Redirect if not logged in
        if (!localStorage.getItem("token")) {
            alert("Please login first");
            window.location.href = "login.html";
        }

        const container = document.getElementById("browseEventsContainer");

        /**
         * 🔥 Fetch all available events from Django
         */
        async function loadAllEvents() {
            try {
                // Ensure api.js is loaded. Hits http://127.0.0.1:8000/api/events/
                const events = await apiRequest('/events/');

                container.innerHTML = "";

                if (!events || events.length === 0) {
                    container.innerHTML = "<p class='text-center'>No events available at the moment.</p>";
                    return;
                }

                // Render events from your SQLite database
                container.innerHTML = events.map(e => {
                    const BASE_URL = 'http://127.0.0.1:8000';

                    // 1. Determine theme color based on category
                    const category = e.category || 'General';
                    let themeColor = '#6366f1'; // Default Technology (Indigo)
                    if (category.toLowerCase().includes('music')) themeColor = '#a855f7'; // Purple
                    if (category.toLowerCase().includes('business')) themeColor = '#22c55e'; // Green

                    // 2. Resolve the image path
                    const imageUrl = e.image
                        ? (e.image.startsWith('http') ? e.image : `${BASE_URL}${e.image}`)
                        : '';

                    // 3. Return the original "Icon-Style" card layout
                    return `
        <div class="col-md-4 mb-4">
            <div class="card h-100 border-0" style="background: #121214; border-radius: 20px; padding: 20px;">
                <!-- Icon Container with Glow (Matches image_4db6a2.jpg) -->
                <div class="position-relative d-flex justify-content-center align-items-center" 
                     style="height: 180px; background: linear-gradient(135deg, #1a1a1c 0%, #000 100%); border-radius: 15px; margin-bottom: 20px;">
                    
                    <span class="position-absolute" style="top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: #fff; padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 0.8rem;">
                        ${category.toUpperCase()}
                    </span>

                    <!-- Centered Icon Image -->
                    <img src="${imageUrl}" style="width: 80px; height: 80px; object-fit: contain; filter: drop-shadow(0 0 15px ${themeColor});" alt="icon">
                </div>

                <div class="card-body p-0 d-flex flex-column">
                    <small style="color: ${themeColor}; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; font-size: 0.65rem;">
                        ${category}
                    </small>
                    <h5 class="card-title fw-bold text-white mt-1 mb-2" style="font-family: 'Syne', sans-serif;">
                        ${e.title || e.name}
                    </h5>
                    
                    <div class="text-secondary mb-3" style="font-size: 0.8rem;">
                        <div class="mb-1"><i class="bi bi-calendar-event me-2"></i> ${e.date}</div>
                        <div><i class="bi bi-geo-alt me-2"></i> ${e.location || 'Venue TBA'}</div>
                    </div>

                    <!-- Progress Bar Component -->
                    <div class="mt-auto">
                        <div class="d-flex justify-content-between mb-1" style="font-size: 0.7rem; color: #555;">
                            <span>Spots available</span>
                            <span>Live</span>
                        </div>
                        <div class="progress mb-4" style="height: 5px; background: #2a2a2d; border-radius: 10px;">
                            <div class="progress-bar" role="progressbar" style="width: 75%; background: ${themeColor}; border-radius: 10px;"></div>
                        </div>

                        <!-- Price and Register Button Footer -->
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold" style="color: #ffc107; font-size: 1.3rem;">$${e.price || '0'}</span>
                            <button class="btn" style="background: linear-gradient(90deg, #6366f1, #a855f7); color: white; border-radius: 10px; padding: 8px 24px; font-weight: 600; border: none;" onclick="registerForEvent(${e.id})">
                                Register
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
                }).join("");
            } catch (error) {
                console.error("Load Error:", error);
                container.innerHTML = `
                    <div class="text-center">
                        <p class='text-danger'>Failed to load events.</p>
                        <p class='small text-muted'>Check if Django server is running at port 8000</p>
                    </div>`;
            }
        }

        /**
         * 📝 Register for an event
         */
        async function registerForEvent(eventId) {
            try {
                // Uses api.js to send POST with Token
                const response = await apiRequest('/register-event/', 'POST', {
                    event_id: eventId
                });

                alert(response.message || "Successfully registered!");
                window.location.href = "my-events.html";

            } catch (error) {
                console.error("Registration Error:", error);
                alert(error.error || "You are already registered for this event.");
            }
        }

        /**
         * 🚪 Logout Logic
         */
        function logoutUser() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        // Initialize - This runs as soon as the page is ready
        document.addEventListener("DOMContentLoaded", loadAllEvents);
    </script>
</body>

</html>
