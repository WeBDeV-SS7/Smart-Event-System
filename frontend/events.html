<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Events – EventSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <a href="index.html" class="navbar-brand">EventSphere</a>
        <div>
            <a href="my-events.html" class="btn btn-outline-light btn-sm me-2">My Events</a>
            <button onclick="logoutUser()" class="btn btn-danger btn-sm">Logout</button>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container mt-5">
        <h2 class="mb-4 text-center">Available Events</h2>
        <div class="row" id="browseEventsContainer">
            <p class="text-center">Loading available events...</p>
        </div>
    </div>

    <!-- JS DEPENDENCIES -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // 🔒 Protect page
        if (!localStorage.getItem("user_id")) {
            alert("Please login first");
            window.location.href = "login.html";
        }

        const container = document.getElementById("browseEventsContainer");

        // 🔥 Fetch all available events from Django
        async function loadAllEvents() {
            try {
                // Hits http://127.0.0.1:8000/api/events/
                const events = await apiRequest('/events/');

                container.innerHTML = "";

                if (!events || events.length === 0) {
                    container.innerHTML = "<p class='text-center'>No events available at the moment.</p>";
                    return;
                }

                container.innerHTML = events.map(e => `
                    <div class="col-md-4 mb-4">
                        <div class="card shadow-sm h-100 border-0">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title text-primary">${e.title || e.name}</h5>
                                <p class="text-muted mb-1"><strong>Date:</strong> ${e.date}</p>
                                <p class="text-muted small"><strong>Location:</strong> ${e.location || 'Venue TBA'}</p>
                                <p class="card-text text-secondary small flex-grow-1">
                                    ${e.description || 'No description provided.'}
                                </p>
                                <button class="btn btn-primary w-100 mt-3" onclick="registerForEvent(${e.id})">
                                    Register Now
                                </button>
                            </div>
                        </div>
                    </div>`).join("");

            } catch (error) {
                console.error("Load Error:", error);
                container.innerHTML = "<p class='text-danger text-center'>Failed to load events. Is your Django server running?</p>";
            }
        }

        // 📝 Register for an event
        async function registerForEvent(eventId) {
            try {
                // Matches the register_event function in your views.py
                const response = await apiRequest('/register-event/', 'POST', {
                    event_id: eventId
                });

                alert(response.message || "Successfully registered!");
                window.location.href = "my-events.html"; // Take them to see their registration

            } catch (error) {
                console.error("Registration Error:", error);
                alert(error.error || "You are already registered for this event.");
            }
        }

        function logoutUser() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        // Initialize
        document.addEventListener("DOMContentLoaded", loadAllEvents);
    </script>
</body>

</html>
