<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events – EventSphere</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <a href="index.html" class="navbar-brand">EventSphere</a>
        <div>
            <a href="my-events.html" class="btn btn-outline-light btn-sm me-2">My Events</a>
            <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
        </div>
    </nav>

    <!-- EVENTS SECTION -->
    <div class="container mt-5">
        <h2 class="mb-4 text-center">Available Events</h2>

        <div class="row" id="eventsContainer"></div>
    </div>

    <!-- JS -->
    <script src="js/main.js"></script>

    <script>
        // Protect page
        if (!localStorage.getItem("user_id")) {
            alert("Please login first");
            window.location.href = "login.html";
        }

        const container = document.getElementById("eventsContainer");

        // Fetch events from API (REPLACED DUMMY DATA)
        fetch("http://localhost:5000/api/events")   // <-- change URL if needed
            .then(res => res.json())
            .then(events => {

                events.forEach(e => {
                    container.innerHTML += `
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">${e.title}</h5>
                    <p class="text-muted mb-1">${e.date}</p>
                    <p class="text-muted">${e.location}</p>

                    <button class="btn btn-primary w-100"
                        onclick="registerEvent(${e.id})">
                        Register
                    </button>
                </div>
            </div>
        </div>`;
                });

            })
            .catch(err => {
                console.error("Error fetching events:", err);
                container.innerHTML = "<p class='text-danger text-center'>Failed to load events</p>";
            });

        // Register event
        function registerEvent(eventId) {
            let myEvents = JSON.parse(localStorage.getItem("myEvents")) || [];

            if (myEvents.includes(eventId)) {
                alert("Already registered!");
                return;
            }

            myEvents.push(eventId);
            localStorage.setItem("myEvents", JSON.stringify(myEvents));

            alert("Successfully registered!");
        }
    </script>

</body>

</html>
